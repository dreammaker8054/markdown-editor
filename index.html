<!-- Main Content -->
<div class="flex-1 flex flex-col min-w-0 bg-surface dark:bg-slate-950">
<!-- TopAppBar -->

  <option value="75">75%</option>

  <option value="125">125%</option>
  <option value="150">150%</option>

</button>
<button id="btn-open" class="text-on-surface-variant dark:text-slate-300 hover:bg-surface-container-low dark:hover:bg-slate-800 px-3 py-1.5 rounded-full text-body-ui font-bold transition-colors flex items-center gap-1 shrink-0" title="파일 열기">
